<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Control System (Node.js)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #222; color: white; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* 狀態顯示區 */
        .status-box { background: #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .status-text { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .safe { color: #4CAF50; }
        .danger { color: #F44336; animation: blink 0.5s infinite; }
        .locked { color: #FF9800; }
        
        /* LED 模擬區 */
        .led-container { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .led { width: 60px; height: 60px; border-radius: 50%; background-color: #444; border: 4px solid #555; transition: 0.3s; }
        .led.on { background-color: #00E5FF; box-shadow: 0 0 20px #00E5FF; border-color: white; }
        
        /* 進度條 */
        .progress-bar { width: 100%; height: 20px; background: #444; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #4CAF50; width: 0%; transition: width 0.5s; }

        /* 按鈕區 */
        .controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #555; color: white; transition: 0.2s; }
        button:hover { background: #777; }
        button:active { transform: scale(0.98); }
        .btn-exec { background: #2196F3; }
        .btn-alarm { background: #F44336; }
        .btn-standby { background: #4CAF50; }
        .btn-pause { background: #FF9800; }

        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Machine Control System</h1>

    <div class="status-box">
        <div>System State: <span id="sysState" class="status-text">IDLE</span></div>
        <div>Lock Status: <span id="lockState" class="status-text">UNLOCKED</span></div>
        <div>ADC Value: <span id="adcVal">0</span> (Threshold: 800)</div>
    </div>

    <div class="led-container">
        <div><div id="led1" class="led"></div><br>Item 1</div>
        <div><div id="led2" class="led"></div><br>Item 2</div>
        <div><div id="led3" class="led"></div><br>Item 3</div>
        <div><div id="led4" class="led"></div><br>Item 4</div>
    </div>

    <div class="controls">
        <button class="btn-exec" onclick="sendCommand('1')">Execute Item 1</button>
        <button class="btn-exec" onclick="sendCommand('2')">Execute Item 2</button>
        <button class="btn-exec" onclick="sendCommand('3')">Execute Item 3</button>
        <button class="btn-exec" onclick="sendCommand('4')">Execute Item 4</button>
        
        <button class="btn-standby" onclick="sendCommand('B')">[B] Standby & Auto</button>
        <button class="btn-pause" onclick="sendCommand('S')">[S] Pause / Resume</button>
        <button class="btn-alarm" style="grid-column: span 2;" onclick="sendCommand('A')">[A] UNLOCK / DISMISS ALARM</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    // 傳送指令給後端
    function sendCommand(key) {
        socket.emit('command', key);
    }

    // 監聽鍵盤事件 (符合需求)
    document.addEventListener('keydown', (e) => {
        const key = e.key.toUpperCase();
        if (['1', '2', '3', '4', 'A', 'B', 'S'].includes(key)) {
            sendCommand(key);
        }
    });

    // 更新 LED 狀態
    socket.on('led_update', (data) => {
        const el = document.getElementById(`led${data.led}`);
        if (el) {
            if (data.status) el.classList.add('on');
            else el.classList.remove('on');
        }
    });

    // 更新 ADC 數值
    socket.on('adc_data', (val) => {
        document.getElementById('adcVal').innerText = val;
    });

    // 更新系統整體狀態
    socket.on('status_update', (state) => {
        const sysLabel = document.getElementById('sysState');
        const lockLabel = document.getElementById('lockState');

        // 設定文字狀態
        if (state.isAlarm) {
            sysLabel.innerText = "!!! ALARM !!!";
            sysLabel.className = "status-text danger";
        } else if (state.isPaused) {
            sysLabel.innerText = "PAUSED";
            sysLabel.className = "status-text locked";
        } else if (state.mode === 'AUTO_RUN') {
            sysLabel.innerText = `AUTO RUN (Item ${state.currentTask || 'Wait'})`;
            sysLabel.className = "status-text safe";
        } else if (state.currentTask) {
            sysLabel.innerText = `EXECUTING ITEM ${state.currentTask}`;
            sysLabel.className = "status-text safe";
        } else {
            sysLabel.innerText = "IDLE";
            sysLabel.className = "status-text";
        }

        // 設定鎖定狀態
        if (state.isLocked) {
            lockLabel.innerText = "LOCKED (Mutex)";
            lockLabel.className = "status-text locked";
        } else {
            lockLabel.innerText = "UNLOCKED";
            lockLabel.className = "status-text safe";
        }
    });
</script>

</body>
</html>
